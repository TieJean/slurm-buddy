# slurm-buddy defaults. Copy to ~/.config/slurm-buddy/config.ini to override.

[idev]
# Defaults used by `sb idev` when a flag is not given.
partition = cpu-interactive
time = 1:00:00
cpus = 4
nodes = 1
# account is auto-detected from your SLURM associations when left blank.
account =

[history]
# Default look-back window (days) for `sb history`.
days = 7

[ui]
# Set to false to disable ANSI color globally.
color = true
