# slurm-buddy defaults. Copy to ~/.config/slurm-buddy/config.ini to override.
#
# Cluster-specific settings live in sections named [<name>.<ClusterName>] and
# take effect ONLY on the cluster whose SLURM ClusterName matches. Plain
# [<name>] sections (no suffix) are cluster-neutral and apply everywhere.
# This file can therefore carry settings for several clusters at once without
# one cluster's values leaking onto another.
#
# Find a cluster's name with:  scontrol show config | grep ClusterName

# ---- cluster-neutral -------------------------------------------------------

[idev]
# Defaults for `sb idev`, used when a flag is not given. Safe on any cluster;
# the interactive partition is cluster-specific (see below).
time = 1:00:00
nodes = 1
# On a GPU partition, request this many GPUs by default (capped to one node's
# GPU count). CPUs are then matched automatically at the node's cores-per-GPU
# ratio -- the most CPUs you can take without raising the bill.
gpus = 4
# CPU count on a non-GPU partition (on GPU partitions CPUs are matched to the
# GPUs instead of using this).
cpus = 4
# Notification email (job-start mail) is intentionally NOT set here -- it is
# personal. `sb idev` reads it from $SLURM_EMAIL, or from an 'email' key that
# it writes into ~/.config/slurm-buddy/config.ini (outside the repo, never
# committed). It prompts once if unset; change it with `sb idev --set-email`.

[history]
# Default look-back window (days) for `sb history`.
days = 7

[ui]
# Set to false to disable ANSI color globally.
color = true

# ---- NCSA Delta ------------------------------------------------------------
# To use slurm-buddy on another cluster, add matching [idev.<name>] and
# [gpu_memory.<name>] sections for it; the Delta ones below stay dormant.

[idev.delta]
# Interactive partition `sb idev` targets by default on Delta.
partition = cpu-interactive
# Default account to charge. Leave blank to fall back to your SLURM default
# account (which on Delta is 'noalloc' -- no allocation; set a real one here):
# account = bewg-delta-gpu

[gpu_memory.delta]
# Per-GPU memory shown by `sb queues`. SLURM does not report this, so it is a
# static lookup. Key by GPU model (as shown in `sb queues`); append
# ':<gpus-per-node>' when one model ships in multiple memory sizes.
A100 = 40G
A40 = 48G
H200 = 141G
MI100 = 32G
MI210 = 64G
