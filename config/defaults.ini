# slurm-buddy defaults. Copy to ~/.config/slurm-buddy/config.ini to override.

[idev]
# Defaults used by `sb idev` when a flag is not given.
partition = cpu-interactive
time = 1:00:00
cpus = 4
nodes = 1
# account is auto-detected from your SLURM associations when left blank.
account =

[history]
# Default look-back window (days) for `sb history`.
days = 7

[ui]
# Set to false to disable ANSI color globally.
color = true

[gpu_memory]
# Per-GPU memory shown by `sb queues`. SLURM does not report this, so it is a
# static lookup. Key by GPU model (as shown in `sb queues`); when one model
# ships in several memory sizes on the same cluster, append ':<gpus-per-node>'
# to disambiguate.
#
# 'cluster' guards the table: it is used ONLY when it equals the running
# cluster's SLURM ClusterName, so these Delta figures never show on another
# cluster. On a different cluster, set 'cluster' to your ClusterName (see
# `scontrol show config | grep ClusterName`) and replace the entries below;
# unguarded/mismatched -> the GPU MEM column shows '?'.
cluster = delta
A100:4 = 40G
A100:8 = 80G
A40 = 48G
H200 = 141G
MI100 = 32G
MI210 = 64G
